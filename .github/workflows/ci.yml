name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check (Vite)
        run: pnpm exec tsc --project tsconfig.app.json --noEmit

      - name: TypeScript type check (Convex)
        run: pnpm exec tsc --project convex/tsconfig.json --noEmit

      - name: ESLint
        run: pnpm exec eslint --max-warnings 10

      - name: Prettier check
        run: pnpm run prettier-check

      - name: Build (Vite frontend)
        run: pnpm run build
