name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Deploy Convex backend ────────────────────────────────────────────────
      - name: Deploy Convex functions
        run: pnpm exec convex deploy --cmd 'pnpm run build'
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          HERCULES_OIDC_AUTHORITY: ${{ secrets.HERCULES_OIDC_AUTHORITY }}
          HERCULES_OIDC_CLIENT_ID: ${{ secrets.HERCULES_OIDC_CLIENT_ID }}
          HERCULES_API_KEY: ${{ secrets.HERCULES_API_KEY }}

      # ── Build Vite frontend ─────────────────────────────────────────────────
      - name: Build frontend
        run: pnpm run build
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_HERCULES_OIDC_AUTHORITY: ${{ secrets.VITE_HERCULES_OIDC_AUTHORITY }}
          VITE_HERCULES_OIDC_CLIENT_ID: ${{ secrets.VITE_HERCULES_OIDC_CLIENT_ID }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}

      # ── Upload dist/ to your hosting provider ───────────────────────────────
      # Uncomment and configure one of the following deployment targets:

      # Option A: Deploy to a Linux server via rsync
      # - name: Deploy to server
      #   run: |
      #     rsync -avz --delete dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/canflow/
      #   env:
      #     SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      # Option B: Deploy to AWS S3 + CloudFront
      # - name: Deploy to S3
      #   run: aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} --delete
      #   env:
      #     AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     AWS_REGION: ca-central-1
      # - name: Invalidate CloudFront
      #   run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} --paths "/*"

      # Option C: Hercules Platform (click Publish in the App Builder)
      # No CI/CD required — Hercules handles deployment automatically.

      - name: Deployment complete
        run: echo "Deployment finished at $(date -u)"
